name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────
  # Detect which parts of the repo changed
  # ────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      ios: ${{ steps.filter.outputs.ios }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ios:
              - 'ScrollDown/**'
              - 'ScrollDown.xcodeproj/**'
            web:
              - 'web/**'

  # ────────────────────────────────────────────────────────
  # iOS — build + test (only when iOS files changed)
  # ────────────────────────────────────────────────────────
  ios:
    needs: changes
    if: needs.changes.outputs.ios == 'true' || github.event_name == 'push'
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"

      - name: Ensure iOS Simulator Runtime
        run: |
          if ! xcrun simctl list devices available | grep -q "iPhone"; then
            echo "No iOS simulators found — downloading runtime..."
            xcodebuild -downloadPlatform iOS
          else
            echo "iOS simulators available"
          fi

      - name: Pick Simulator
        id: sim
        run: |
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data.get('devices', {}).items():
              if 'iOS' not in runtime:
                  continue
              for d in devices:
                  if 'iPhone' in d['name'] and d['isAvailable']:
                      print(d['name'])
                      sys.exit(0)
          print('iPhone 16')
          ")
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $DEVICE"

      - name: Generate Info.plist
        run: |
          cat > ScrollDown/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>SPORTS_DATA_API_KEY</key>
            <string>CI_PLACEHOLDER</string>
            <key>NSAppTransportSecurity</key>
            <dict>
              <key>NSAllowsLocalNetworking</key>
              <true/>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Build
        run: |
          xcodebuild build-for-testing \
            -scheme ScrollDown \
            -destination 'platform=iOS Simulator,name=${{ steps.sim.outputs.device }}' \
            -quiet

      - name: Test
        run: |
          xcodebuild test-without-building \
            -scheme ScrollDown \
            -destination 'platform=iOS Simulator,name=${{ steps.sim.outputs.device }}' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult

      - name: Coverage Summary
        if: always()
        run: |
          xcrun xccov view --report TestResults.xcresult | head -60

  # ────────────────────────────────────────────────────────
  # Web — lint, typecheck, build (only when web/ changed)
  # ────────────────────────────────────────────────────────
  web:
    needs: changes
    if: needs.changes.outputs.web == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # ────────────────────────────────────────────────────────
  # Docker — build + push image (main branch only, web changes only)
  # ────────────────────────────────────────────────────────
  docker:
    needs: [changes, web]
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: web
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:latest
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────
  # Deploy — pull + restart on Hetzner (after docker push)
  # ────────────────────────────────────────────────────────
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production

    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/scrolldown-web
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}/web:latest
            docker compose up -d --no-deps --wait scrolldown-web
            docker image prune -f
