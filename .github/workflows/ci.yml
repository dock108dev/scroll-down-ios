name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-quality:
    name: PR Fast Quality Gates
    if: github.event_name != 'schedule'
    runs-on: macos-15
    timeout-minutes: 80

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode environment
        run: |
          set -euo pipefail
          xcodebuild -version
          xcode-select -p
          xcrun simctl list runtimes
          xcrun simctl list devices available

      - name: Install XcodeGen
        run: |
          set -euo pipefail
          brew update
          brew install xcodegen

      - name: Guard snapshot recording mode
        run: |
          set -euo pipefail
          if [ "${SNAPSHOT_RECORD:-}" = "1" ]; then
            echo "SNAPSHOT_RECORD must not be enabled in CI"
            exit 1
          fi

      - name: Run fast local build gate
        run: |
          set -euo pipefail
          bash Scripts/local_gate.sh build

      - name: Run coverage gate
        run: |
          set -euo pipefail
          bash Scripts/local_gate.sh coverage

      - name: Run repository script checks
        run: |
          set -euo pipefail
          bash Scripts/local_gate.sh script-checks

      - name: Run UI smoke gate
        run: |
          set -euo pipefail
          bash Scripts/local_gate.sh ui-smoke

      - name: Collect simulator diagnostics
        if: always()
        run: |
          set -euo pipefail
          mkdir -p .build/artifacts/simulator
          xcrun simctl io booted screenshot .build/artifacts/simulator/final-screen.png || true
          xcrun simctl spawn booted log collect --output .build/artifacts/simulator/system.logarchive || true

      - name: Upload XCTest result bundles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ScrollDownSports-pr-xcresults
          path: .build/TestResults/*.xcresult
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ScrollDownSports-pr-coverage
          path: .build/coverage
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload snapshot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ScrollDownSports-pr-snapshot-artifacts
          path: |
            ScrollDownSportsTests/__Snapshots__
            .build/DerivedData/Logs/Test
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload simulator logs and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ScrollDownSports-pr-simulator-diagnostics
          path: .build/artifacts/simulator
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload generated project
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ScrollDownSports-pr-generated-xcodeproj
          path: ScrollDownSports.xcodeproj
          if-no-files-found: error
          retention-days: 7

  nightly-visual:
    name: Nightly Visual Matrix (${{ matrix.device.name }})
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    timeout-minutes: 80
    strategy:
      fail-fast: false
      matrix:
        device:
          - name: compact-phone
            destination: "platform=iOS Simulator,name=iPhone 16,OS=latest"
          - name: large-phone
            destination: "platform=iOS Simulator,name=iPhone 16 Pro Max,OS=latest"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          set -euo pipefail
          brew update
          brew install xcodegen

      - name: Guard snapshot recording mode
        run: |
          set -euo pipefail
          if [ "${SNAPSHOT_RECORD:-}" = "1" ]; then
            echo "SNAPSHOT_RECORD must not be enabled in CI"
            exit 1
          fi

      - name: Run visual regression gate
        env:
          TEST_DESTINATION: ${{ matrix.device.destination }}
        run: |
          set -euo pipefail
          bash Scripts/local_gate.sh visual

      - name: Upload visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ScrollDownSports-visual-${{ matrix.device.name }}
          path: |
            .build/TestResults/*.xcresult
            ScrollDownSportsTests/__Snapshots__
            .build/DerivedData/Logs/Test
          if-no-files-found: ignore
          retention-days: 30

  nightly-ui-accessibility:
    name: Nightly UI and Accessibility (${{ matrix.device.name }})
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        device:
          - name: small-phone
            destination: "platform=iOS Simulator,name=iPhone SE (3rd generation),OS=latest"
          - name: compact-phone
            destination: "platform=iOS Simulator,name=iPhone 16,OS=latest"
          - name: large-phone
            destination: "platform=iOS Simulator,name=iPhone 16 Pro Max,OS=latest"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          set -euo pipefail
          brew update
          brew install xcodegen

      - name: Run UI smoke gate
        env:
          TEST_DESTINATION: ${{ matrix.device.destination }}
        run: |
          set -euo pipefail
          bash Scripts/local_gate.sh ui-smoke

      - name: Run accessibility gate
        env:
          TEST_DESTINATION: ${{ matrix.device.destination }}
        run: |
          set -euo pipefail
          bash Scripts/local_gate.sh accessibility

      - name: Collect simulator diagnostics
        if: always()
        run: |
          set -euo pipefail
          mkdir -p .build/artifacts/simulator
          xcrun simctl io booted screenshot .build/artifacts/simulator/final-screen-${{ matrix.device.name }}.png || true
          xcrun simctl spawn booted log collect --output .build/artifacts/simulator/system-${{ matrix.device.name }}.logarchive || true

      - name: Upload UI and accessibility artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ScrollDownSports-ui-accessibility-${{ matrix.device.name }}
          path: |
            .build/TestResults/*.xcresult
            .build/DerivedData/Logs/Test
            .build/artifacts/simulator
          if-no-files-found: ignore
          retention-days: 30

  nightly-performance:
    name: Nightly Performance Smoke
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    timeout-minutes: 80

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          set -euo pipefail
          brew update
          brew install xcodegen

      - name: Run performance smoke gate
        run: |
          set -euo pipefail
          bash Scripts/local_gate.sh performance-smoke

      - name: Collect simulator diagnostics
        if: always()
        run: |
          set -euo pipefail
          mkdir -p .build/artifacts/simulator
          xcrun simctl io booted screenshot .build/artifacts/simulator/final-screen-performance.png || true
          xcrun simctl spawn booted log collect --output .build/artifacts/simulator/system-performance.logarchive || true

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ScrollDownSports-performance
          path: |
            .build/TestResults/*.xcresult
            .build/DerivedData/Logs/Test
            .build/artifacts/simulator
          if-no-files-found: ignore
          retention-days: 30
